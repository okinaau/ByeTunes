name: Build Unsigned IPA

on:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Xcode
        run: brew install xcode

      - name: Build IPA
        run: |
          cd MusicManager
          xcodebuild archive -project MusicManager.xcodeproj -scheme MusicManager -configuration Release -archivePath build/Archive.xcarchive
          xcodebuild -exportArchive -archivePath build/Archive.xcarchive -exportPath build/UnsignedIPA -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v2
        with:
          name: UnsignedIPA
          path: build/UnsignedIPA/*.ipa

# Create exportOptions.plist with:
# {
#   "method": "ad-hoc",
#   "teamID": "",
#   "signingCertificate": "",
#   "provisioningProfiles": []
