name: Build Unsigned IPA

# Manually trigger from the Actions tab, or it runs automatically on push to main.
#
# This builds ByeTunes on a GitHub-hosted macOS runner (which has Xcode
# preinstalled) and packages an UNSIGNED .ipa as a downloadable artifact.
#
# IMPORTANT: an unsigned IPA cannot be installed on an iPhone as-is. iOS requires
# every app to be signed before install, even for sideloading. Once you download
# this .ipa you still need to sign it with something like AltStore, Sideloadly, or
# a signing service (using a free Apple ID or a paid developer account) before it
# will actually install on a device.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  IDEVICE_REPO: https://github.com/jkcoxson/idevice
  # Only used if the deployment target can't be auto-detected from the project below.
  FALLBACK_DEPLOYMENT_TARGET: "16.0"

jobs:
  build:
    # arm64 runner with Xcode 26.x preinstalled (well above the README's Xcode 15+
    # requirement). If this label isn't available on your account, use macos-15 instead.
    runs-on: macos-26

    steps:
      - name: Checkout ByeTunes
        uses: actions/checkout@v4
        with:
          path: ByeTunes

      - name: Show active Xcode version
        run: xcodebuild -version

      - name: Add the iOS Rust target
        run: rustup target add aarch64-apple-ios

      - name: Clone idevice (source of libidevice_ffi.a + idevice.h)
        run: git clone --depth 1 "$IDEVICE_REPO" idevice-src

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: idevice-src

      - name: Detect deployment target from the Xcode project
        id: deployment_target
        run: |
          cd ByeTunes
          DETECTED=$(grep -m1 -oE 'IPHONEOS_DEPLOYMENT_TARGET = [0-9]+\.[0-9]+' \
            MusicManager.xcodeproj/project.pbxproj | grep -oE '[0-9]+\.[0-9]+' || true)
          if [ -z "$DETECTED" ]; then
            echo "Could not auto-detect deployment target, falling back to $FALLBACK_DEPLOYMENT_TARGET"
            DETECTED="$FALLBACK_DEPLOYMENT_TARGET"
          fi
          echo "Using deployment target: $DETECTED"
          echo "target=$DETECTED" >> "$GITHUB_OUTPUT"

      - name: Build idevice-ffi for arm64 iOS
        working-directory: idevice-src
        env:
          IPHONEOS_DEPLOYMENT_TARGET: ${{ steps.deployment_target.outputs.target }}
        run: cargo build --release --package idevice-ffi --target aarch64-apple-ios

      - name: Locate the built library and header
        id: idevice_files
        run: |
          echo "Static libraries found:"
          find idevice-src -name "libidevice_ffi.a" -print
          echo "Headers found:"
          find idevice-src -name "idevice.h" -print

          LIB=$(find idevice-src -name "libidevice_ffi.a" -path "*aarch64-apple-ios*" | head -n 1)
          HEADER=$(find idevice-src -name "idevice.h" | head -n 1)

          if [ -z "$LIB" ] || [ -z "$HEADER" ]; then
            echo "::error::Could not find libidevice_ffi.a and/or idevice.h in the idevice checkout. Check the file lists above and adjust the 'find' paths in this step to match."
            exit 1
          fi

          echo "lib=$LIB" >> "$GITHUB_OUTPUT"
          echo "header=$HEADER" >> "$GITHUB_OUTPUT"

      - name: Copy idevice files into the Xcode project
        run: |
          cp "${{ steps.idevice_files.outputs.lib }}" ByeTunes/MusicManager/libidevice_ffi.a
          cp "${{ steps.idevice_files.outputs.header }}" ByeTunes/MusicManager/idevice.h
          ls -la ByeTunes/MusicManager/

      - name: Diagnose MediaLibraryBuilder dependency
        working-directory: ByeTunes
        run: |
          echo "--- Files/folders mentioning MediaLibraryBuilder ---"
          grep -rl "MediaLibraryBuilder" . \
            --include="*.swift" --include="*.pbxproj" --include="Podfile*" --include="Package.swift" \
            || echo "(no text matches found)"
          echo ""
          echo "--- Any folder/file literally named *MediaLibrary* ---"
          find . -iname "*MediaLibrary*" || true
          echo ""
          echo "--- Swift Package references declared in the project ---"
          grep -B2 -A6 "XCLocalSwiftPackageReference\|XCRemoteSwiftPackageReference" \
            MusicManager.xcodeproj/project.pbxproj || echo "(none found)"
          echo ""
          echo "--- Podfile present? ---"
          ls -la | grep -i pod || echo "(no Podfile)"
          echo ""
          echo "--- All targets in the project ---"
          xcodebuild -list -project MusicManager.xcodeproj

      - name: Create bridging header
        # Per the README, the project expects a Bridging-Header.h that imports
        # idevice.h, but this file (like the library/header) isn't committed to
        # the repo, so we have to create it ourselves before building.
        run: |
          cat > ByeTunes/MusicManager/Bridging-Header.h << 'EOF'
          #import "idevice.h"
          EOF
          cat ByeTunes/MusicManager/Bridging-Header.h

      - name: Detect the Xcode scheme
        id: scheme
        working-directory: ByeTunes
        run: |
          xcodebuild -list -project MusicManager.xcodeproj
          SCHEME=$(xcodebuild -list -json -project MusicManager.xcodeproj | jq -r '.project.schemes[0]')
          echo "Using scheme: $SCHEME"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build unsigned .app
        working-directory: ByeTunes
        run: |
          xcodebuild \
            -project MusicManager.xcodeproj \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean build

      - name: Package unsigned IPA
        run: |
          BUILD_PRODUCTS="$RUNNER_TEMP/build/Build/Products/Release-iphoneos"
          echo "Contents of $BUILD_PRODUCTS:"
          ls -la "$BUILD_PRODUCTS"

          APP_PATH=$(find "$BUILD_PRODUCTS" -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in $BUILD_PRODUCTS"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r ByeTunes-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ByeTunes-unsigned-ipa
          path: ${{ runner.temp }}/ByeTunes-unsigned.ipa
          retention-days: 14
